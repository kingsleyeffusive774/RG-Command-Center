name = "rag-command-center-api"
main = "worker.js"
compatibility_date = "2024-01-01"

# Workers.dev subdomain (free tier)
workers_dev = true

# KV namespace binding — replace id after: wrangler kv:namespace create "RAG_DATA"
[[kv_namespaces]]
binding = "RG_DATA"
id = "00eb93c98d324a80afb92bb214fa1fb3"

# Routes — configure after deploying with a custom domain
# [env.production]
# routes = [
#   { pattern = "api.ragcommandcenter.com/*", zone_name = "ragcommandcenter.com" }
# ]
